# Reusable secret-scan backstop. Drop into each PUBLIC repo as
# .github/workflows/secret-scan.yml. This is the seatbelt, NOT the gate — the
# allowlist export is the gate. Blocks PRs/pushes that introduce secrets, infra
# IPs, local dev paths, or audit reports.
name: secret-scan
on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, not just HEAD
      - name: gitleaks (with AIPG rules)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml   # commit the AIPG config into the repo

  infra-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: block infra / local-path leaks
        run: |
          set -e
          patt='172\.(30|31)\.[0-9]+\.[0-9]+|/Users/[a-z0-9._-]+/|aipgcoregen|BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY'
          if git grep -nIE "$patt" -- . ':(exclude).gitleaks.toml' ':(exclude)**/secret-scan.yml'; then
            echo "::error::infra/secret string found above — scrub before merge"; exit 1
          fi
          if git ls-files | grep -iE 'security_audit|audit_report'; then
            echo "::error::audit report file tracked — must not ship"; exit 1
          fi
          echo "infra-string scan clean"
